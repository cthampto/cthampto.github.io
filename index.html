---
layout: default
---

<section>
  <h2 class="feed-title"><span class="prompt">&gt;</span> Threat Feed</h2>
  <div class="posts">
    {% for post in site.posts %}
      <article class="post" data-index="{{ forloop.index }}">

        <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

        <div class="entry">
          {{ post.excerpt }}
        </div>

        <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
      </article>
    {% endfor %}
  </div>
</section>
