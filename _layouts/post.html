---
layout: default
---

<article class="post">
  <div class="post-meta-bar">
    <span class="label">// THREAT INTEL</span>
    <span>{{ page.date | date: "%Y-%m-%d" }}</span>
    <span class="badge badge--info">ANALYSIS</span>
  </div>

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    [ LOGGED: {{ page.date | date: "%B %e, %Y" }} ]
  </div>

  {% include disqus.html %}
</article>
